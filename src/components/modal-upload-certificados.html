<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="../css/components/modal-upload-certificados.css"
    />
  </head>
  <body>
    <div class="modal-certificado">
      <div class="modal-header">
        <div class="column">
          <h2>Enviar novo certificado</h2>
          <p>
            Anexe o comprovante e descreva a atividade realizada para validação.
          </p>
        </div>

        <button class="close-modal">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="lucide lucide-x h-4 w-4"
          >
            <path d="M18 6 6 18"></path>
            <path d="m6 6 12 12"></path>
          </svg>
        </button>
      </div>

      <form class="form-certificado">
        <div class="form-group">
          <label for="titulo"> Título do certificado </label>

          <input
            type="text"
            id="titulo"
            placeholder="Ex: Workshop de Inteligência Artificial"
          />
        </div>

        <div class="form-group">
          <label for="descricao"> Descrição </label>

          <textarea
            id="descricao"
            maxlength="500"
            placeholder="Descreva brevemente a atividade, instituição e carga horária."
          ></textarea>

          <span class="contador"> 0/500 </span>
        </div>

        <div class="form-group">
          <label> Arquivo do certificado </label>

          <label for="arquivo" class="upload-area">
            <div class="upload-icon">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="16"
                height="16"
                fill="#172126"
                class="bi bi-upload"
                viewBox="0 0 16 16"
              >
                <path
                  d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5"
                />
                <path
                  d="M7.646 1.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1-.708.708L8.5 2.707V11.5a.5.5 0 0 1-1 0V2.707L5.354 4.854a.5.5 0 1 1-.708-.708z"
                />
              </svg>
            </div>

            <strong> Arraste ou clique para adicionar </strong>

            <span> PDF, JPG ou PNG • Máx. 5MB </span>

            <input type="file" id="arquivo" hidden />
          </label>
        </div>

        <div class="modal-actions">
          <button type="button" class="btn-cancelar">Cancelar</button>

          <button type="submit" class="btn-enviar">Enviar Certificado</button>
        </div>
      </form>
    </div>
  </body>
</html>
