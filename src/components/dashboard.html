<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <link rel="stylesheet" href="../css/pages/dashboard.css" />

    <title>Dashboard</title>
  </head>

  <body>
    <main>
      <!-- SIDEBAR (já feito) -->
      <div class="container">
        <header id="sidebar">
          <!-- mantém seu código -->
        </header>
      </div>

      <!-- CONTEÚDO -->
      <div class="container">
        <header id="navbar">
          <!-- mantém seu código -->
        </header>

        <div class="container-main">
          <section class="dashboard">
            <div class="dashboard-header">
              <h1>Dashboard</h1>
              <p>Resumo geral do sistema</p>
            </div>

            <div class="dashboard-cards">
              <div class="card">
                <span class="card-title">Eventos</span>
                <span class="card-value">03</span>
              </div>

              <div class="card">
                <span class="card-title">Atividades</span>
                <span class="card-value">05</span>
              </div>

              <div class="card">
                <span class="card-title">Certificados</span>
                <span class="card-value">02</span>
              </div>

              <div class="card card-highlight">
                <span class="card-title">Presença</span>
                <span class="card-value">Ativa</span>
              </div>
            </div>
          </section>
        </div>
      </div>
    </main>
  </body>
</html>
